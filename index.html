<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkers Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div class="start-screen" id="start-screen">
            <h1>Checkers</h1>
            <p class="subtitle">Choose Your Side</p>
            
            <div class="side-selection">
                <button class="side-btn" id="play-red">
                    <span class="side-color red-side"></span>
                    <span>Play as Red</span>
                </button>
                <button class="side-btn" id="play-black">
                    <span class="side-color black-side"></span>
                    <span>Play as Black</span>
                </button>
            </div>

            <p class="subtitle">Choose Difficulty</p>
            
            <div class="difficulty-selection">
                <button class="difficulty-btn" id="easy-btn">Easy</button>
                <button class="difficulty-btn" id="medium-btn">Medium</button>
                <button class="difficulty-btn" id="hard-btn">Hard</button>
                <button class="difficulty-btn random-btn" id="random-btn">Random 🎲</button>
            </div>

            <div class="ai-info">
                <p id="ai-selection-text">Select a side and difficulty to begin</p>
            </div>

            <button class="start-game-btn" id="start-game-btn" disabled>Start Game</button>
        </div>

        <!-- Game Screen -->
        <div class="game-screen hidden" id="game-screen">
            <h1>Checkers</h1>
            
            <div class="game-info">
                <div class="player-info">
                    <span id="current-player">Red's Turn</span>
                </div>
                <div class="piece-count">
                    <span>Red: <span id="red-count">12</span></span>
                    <span>Black: <span id="black-count">12</span></span>
                </div>
                <div id="game-stats"></div>
            </div>

            <div class="board" id="board"></div>

            <div class="controls">
                <button id="reset-btn">New Game</button>
                <button id="undo-btn">Undo Move</button>
            </div>

            <div class="game-status" id="game-status"></div>
        </div>
    </div>

    <script src="ai.js"></script>
    <script src="game.js"></script>
</body>
</html>
